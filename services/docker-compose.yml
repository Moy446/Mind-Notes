  whisper:
    container_name: transcription_service
    build:
      context: ./whisper
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - ENV=production
    deploy:
        resources:
          limits:
            cpus: "2.0"
            memory: 4G
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_server
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/mindNotes.com.conf
    depends_on:
      - fastapi
    networks:
      - app-network
      